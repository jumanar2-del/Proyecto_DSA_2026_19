# Nombre del paquete
package_name: recomendacion-productos

# Archivos de datos
train_data_file: Clientes.csv
test_data_file: Clientes.csv

# Pipeline
pipeline_save_file: recomendacion-productos-output

# Columnas esperadas en los datos
client_col: Cliente
product_col: CodProducto
month_col: Mes
sales_col: Venta
target_col: target

# Features del modelo
features:
  - compro_mes_ant
  - veces_comprado
  - freq_compra
  - ventas_cliente_ant
  - productos_ant
  - Frecuencia de visita
  - oficina_enc
  - seg5_enc
  - seg4_enc
  - producto_enc

# Features a codificar
categorical_vars:
  - oficina_enc
  - seg5_enc
  - seg4_enc
  - producto_enc

# Parámetros del modelo
test_size: 0.25
random_state: 42

# RandomForest
n_estimators: 200
max_depth: 8

# GradientBoosting
gb_n_estimators: 200
gb_max_depth: 4
gb_learning_rate: 0.05

# Criterio de selección del mejor modelo
best_model_metric: roc_auc

# Top-N recomendaciones por cliente
top_n: 3
